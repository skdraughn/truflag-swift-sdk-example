name: ios-unsigned-ipa

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ios-unsigned-ipa.yml"
      - "TruflagSwiftSample/**"
      - "TruflagSwiftSampleTests/**"
      - "project.yml"
      - "scripts/bootstrap-sdk.sh"
      - "vendor/TruflagSDK.tar.gz"
      - "vendor/TruflagSDK.tar.gz.sha256"

concurrency:
  group: ios-unsigned-ipa-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-unsigned-ipa:
    runs-on: macos-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Bootstrap bundled SDK
        run: |
          chmod +x ./scripts/bootstrap-sdk.sh
          ./scripts/bootstrap-sdk.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (device, unsigned)
        run: |
          xcodebuild \
            -project TruflagSwiftSample.xcodeproj \
            -scheme TruflagSwiftSample \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned IPA
        run: |
          APP_PATH="build/DerivedData/Build/Products/Release-iphoneos/TruflagSwiftSample.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Expected app not found at: $APP_PATH" >&2
            exit 1
          fi
          rm -rf build/Payload
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          (
            cd build
            zip -r TruflagSwiftSample-unsigned.ipa Payload
          )

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TruflagSwiftSample-unsigned-ipa
          path: build/TruflagSwiftSample-unsigned.ipa
          if-no-files-found: error
